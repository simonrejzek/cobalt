name: Sync Upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remember current fork state
        id: fork_state
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Backup custom files
        run: |
          mkdir -p /tmp/cobalt-sync/.github/workflows /tmp/cobalt-sync/scripts /tmp/cobalt-sync/docker
          cp .github/workflows/sync-upstream.yml /tmp/cobalt-sync/.github/workflows/sync-upstream.yml
          cp scripts/apply-path-api-patch.mjs /tmp/cobalt-sync/scripts/apply-path-api-patch.mjs
          cp Dockerfile.web /tmp/cobalt-sync/Dockerfile.web
          cp docker/cobalt-web-nginx.conf /tmp/cobalt-sync/docker/cobalt-web-nginx.conf

      - name: Reset to upstream main
        run: |
          git remote add upstream https://github.com/imputnet/cobalt.git || true
          git fetch upstream main
          git reset --hard upstream/main

      - name: Restore custom files
        run: |
          mkdir -p .github/workflows scripts docker
          cp /tmp/cobalt-sync/.github/workflows/sync-upstream.yml .github/workflows/sync-upstream.yml
          cp /tmp/cobalt-sync/scripts/apply-path-api-patch.mjs scripts/apply-path-api-patch.mjs
          cp /tmp/cobalt-sync/Dockerfile.web Dockerfile.web
          cp /tmp/cobalt-sync/docker/cobalt-web-nginx.conf docker/cobalt-web-nginx.conf

      - name: Reapply same-domain API patch
        run: node scripts/apply-path-api-patch.mjs

      - name: Detect effective changes
        id: change_detection
        run: |
          git add web/src/lib/api/api-url.ts scripts/apply-path-api-patch.mjs .github/workflows/sync-upstream.yml Dockerfile.web docker/cobalt-web-nginx.conf
          if git diff --cached --quiet "${{ steps.fork_state.outputs.sha }}" --; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Fork already matches the patched upstream state"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.change_detection.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: pnpm

      - name: Set up pnpm
        if: steps.change_detection.outputs.changed == 'true'
        uses: pnpm/action-setup@v4

      - name: Validate patched web build
        if: steps.change_detection.outputs.changed == 'true'
        env:
          WEB_DEFAULT_API: https://sync-check.invalid/__cobalt_sync_api_path__
        run: |
          pnpm install --frozen-lockfile
          pnpm run --prefix web check
          pnpm run --prefix web build
          grep -R -n --fixed-strings "https://sync-check.invalid/__cobalt_sync_api_path__" web/build

      - name: Validate API smoke test
        if: steps.change_detection.outputs.changed == 'true'
        run: .github/test.sh api

      - name: Commit sync
        if: steps.change_detection.outputs.changed == 'true'
        run: |
          git add web/src/lib/api/api-url.ts scripts/apply-path-api-patch.mjs .github/workflows/sync-upstream.yml Dockerfile.web docker/cobalt-web-nginx.conf
          git commit -m "Sync upstream cobalt and verify patched same-domain build"

      - name: Push tested main
        if: steps.change_detection.outputs.changed == 'true'
        run: git push --force-with-lease origin HEAD:main
